version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: ccb_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: chronic_care

  redis:
    image: redis:7-alpine
    container_name: ccb_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  webhook-server:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    container_name: ccb_webhook
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/chronic_care?authSource=admin
      - WECHAT_APP_ID=${WECHAT_APP_ID}
      - WECHAT_SECRET=${WECHAT_SECRET}
    depends_on:
      - mongodb
    volumes:
      - ./wechat:/app

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ccb_dashboard
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - mongodb

volumes:
  mongodb_data:
